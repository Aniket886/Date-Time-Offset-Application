<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat</title>
    <link rel="stylesheet" href="{% static 'chatbot/chatbot.css' %}" />
  </head>
  <body style="margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
    <main style="max-width: 960px; margin: 24px auto; padding: 0 16px;">
      <h1 style="margin: 0 0 8px 0; font-size: 20px;">AI Chat</h1>
      <p style="margin: 0 0 16px 0; color: #555;">
        Chat about this Django Date-Time Offset project. Use <code>/reset</code> to clear.
      </p>
    </main>

    <div id="chatbot-root" data-chatbot-api-url="{% url 'chatbot:api' %}"></div>
    <script src="{% static 'chatbot/chatbot.js' %}"></script>
  </body>
</html>
